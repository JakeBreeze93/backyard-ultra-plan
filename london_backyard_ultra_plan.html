<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Backyard Ultra">
<meta name="theme-color" content="#0f0f0f">
<title>Backyard Ultra 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 16px 20px;
  border-bottom: 1px solid #2a2a2a;
}
header h1 { font-size: 20px; font-weight: 700; color: #fff; }
header .meta { display: flex; gap: 12px; margin-top: 4px; font-size: 13px; color: #888; }
header .meta span { white-space: nowrap; }

.hero { padding: 20px; }
.hero-card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 24px;
  border-left: 4px solid #444;
}
.hero-card.easy { border-left-color: #4caf50; }
.hero-card.steady { border-left-color: #4ecdc4; }
.hero-card.loop { border-left-color: #ff8c42; }
.hero-card.double { border-left-color: #ffd93d; }
.hero-card.gym { border-left-color: #c44dff; }
.hero-card.rest { border-left-color: #444; }
.hero-card.sim { border-left-color: #ff6b6b; }
.hero-card.back2back { border-left-color: #ff8c42; }
.hero-card.race { border-left-color: #ff6b6b; }
.hero-date { font-size: 13px; color: #888; margin-bottom: 8px; }
.hero-name { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.hero-detail { font-size: 14px; color: #bbb; line-height: 1.5; }
.hero-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-distance { background: rgba(255,140,66,0.15); color: #ff8c42; }
.badge-sim { background: rgba(255,107,107,0.15); color: #ff6b6b; }
.hero-prestart { text-align: center; padding: 40px 20px; color: #888; font-size: 15px; }

.week-tabs {
  padding: 0 20px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.week-tabs::-webkit-scrollbar { display: none; }
.week-tabs-inner { display: flex; gap: 8px; padding: 4px 0; }
.week-tab {
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  padding: 8px 14px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 600;
  background: #1a1a1a;
  color: #888;
  border: 1px solid #2a2a2a;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.week-tab.active { background: #ff8c42; color: #000; border-color: #ff8c42; }

.week-sessions { padding: 0 20px 20px; }
.session-card {
  background: #1a1a1a;
  border-radius: 12px;
  margin-bottom: 8px;
  border-left: 3px solid #444;
  overflow: hidden;
}
.session-card.easy { border-left-color: #4caf50; }
.session-card.steady { border-left-color: #4ecdc4; }
.session-card.loop { border-left-color: #ff8c42; }
.session-card.double { border-left-color: #ffd93d; }
.session-card.gym { border-left-color: #c44dff; }
.session-card.rest { border-left-color: #444; }
.session-card.sim { border-left-color: #ff6b6b; }
.session-card.back2back { border-left-color: #ff8c42; }
.session-card.race { border-left-color: #ff6b6b; }
.session-card.done { opacity: 0.5; }
.session-card.done .session-name { text-decoration: line-through; }
.session-header {
  display: flex; align-items: center;
  padding: 14px 16px;
  min-height: 44px;
  cursor: pointer; gap: 12px;
}
.session-day { font-size: 12px; font-weight: 600; color: #888; min-width: 32px; }
.session-name { flex: 1; font-size: 14px; font-weight: 500; color: #e0e0e0; }
.session-dist { font-size: 12px; color: #ff8c42; font-weight: 600; }
.session-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.session-card.expanded .session-expand { max-height: 300px; }
.session-detail { padding: 0 16px 14px; font-size: 13px; color: #999; line-height: 1.5; }
.done-btn {
  display: inline-block; margin-top: 10px;
  padding: 8px 16px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  background: rgba(255,140,66,0.1); color: #ff8c42;
  border: 1px solid rgba(255,140,66,0.3);
  cursor: pointer; min-height: 44px; min-width: 44px;
}
.session-card.done .done-btn { background: rgba(255,255,255,0.05); color: #666; border-color: #333; }
.session-card.today .session-header { background: rgba(255,140,66,0.05); }

.volume-chart { padding: 20px; border-top: 1px solid #2a2a2a; margin-top: 10px; }
.volume-title { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 14px; }
.volume-bar-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
.volume-label { font-size: 11px; color: #666; min-width: 26px; }
.volume-bar-bg { flex: 1; height: 18px; background: #1a1a1a; border-radius: 9px; overflow: hidden; }
.volume-bar { height: 100%; border-radius: 9px; background: #333; transition: width 0.5s ease; }
.volume-bar.active { background: #ff8c42; }
.volume-val { font-size: 11px; color: #666; min-width: 28px; text-align: right; }

.info-tabs { padding: 0 20px; margin-top: 20px; border-top: 1px solid #2a2a2a; padding-top: 20px; }
.info-tabs-inner { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 16px; }
.info-tabs-inner::-webkit-scrollbar { display: none; }
.info-tab {
  padding: 8px 14px; border-radius: 22px; font-size: 12px; font-weight: 600;
  background: #1a1a1a; color: #888; border: 1px solid #2a2a2a;
  cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 44px;
  display: flex; align-items: center;
}
.info-tab.active { background: #2a2a2a; color: #fff; border-color: #444; }
.info-panel { padding: 0 20px 40px; }
.info-panel .panel { display: none; }
.info-panel .panel.active { display: block; }
.info-panel h3 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 12px; }
.info-panel p { font-size: 13px; color: #999; line-height: 1.6; margin-bottom: 12px; }
.info-panel ul { font-size: 13px; color: #999; line-height: 1.8; padding-left: 16px; margin-bottom: 12px; }
.info-panel .fuel-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
.info-panel .fuel-row .phase { color: #ff8c42; font-weight: 600; min-width: 60px; }
.info-panel .fuel-row .cals { color: #ccc; }
.info-panel .fuel-row .foods { color: #888; flex: 1; margin-left: 12px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const plan = {
  raceDate: '2026-08-29',
  startDate: '2026-07-06',
  weeks: [
    { week:1, phase:'Recovery', dates:'6–12 Jul', volume:45, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Full rest. Sauna + cold plunge. Elevate legs.'},
      {day:'Tue',type:'easy',name:'Easy Shakeout',detail:'6km very easy. Walk breaks fine. Just move.',distance:'6km'},
      {day:'Wed',type:'gym',name:'Light Gym + Walk',detail:'Bodyweight / light. 30-min walk PM.'},
      {day:'Thu',type:'easy',name:'Easy Run',detail:'8km @ 5:40–6:00/km. Flat. No effort.',distance:'8km'},
      {day:'Fri',type:'easy',name:'Easy + Strides',detail:'8km @ 5:30–5:50/km + 6×100m strides.',distance:'8km'},
      {day:'Sat',type:'easy',name:'Easy Long',detail:'14km @ 5:30–5:50/km. All conversational.',distance:'14km'},
      {day:'Sun',type:'rest',name:'Rest / Walk',detail:'60-min walk or full rest. Sauna + cold plunge.'}
    ]},
    { week:2, phase:'Transition', dates:'13–19 Jul', volume:63, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Sauna + cold plunge. Full rest.'},
      {day:'Tue',type:'double',name:'Easy AM + PM',detail:'AM: 8km easy. PM: 5km very easy (first double).',distance:'13km'},
      {day:'Wed',type:'gym',name:'Lower Body + Easy Run',detail:'Lower body session. PM: 6km easy.',distance:'6km'},
      {day:'Thu',type:'steady',name:'Steady Run',detail:'12km @ 5:10–5:30/km. Controlled.',distance:'12km'},
      {day:'Fri',type:'gym',name:'Upper Body + Easy Run',detail:'Upper body session. PM: 6km easy.',distance:'6km'},
      {day:'Sat',type:'steady',name:'Long Run',detail:'20km @ 5:20–5:40/km. Practise fueling every 30 min.',distance:'20km'},
      {day:'Sun',type:'back2back',name:'Back-to-Back Easy',detail:'10km easy on tired legs. Purpose: learn to restart.',distance:'10km'}
    ]},
    { week:3, phase:'Build', dates:'20–26 Jul', volume:78, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Sauna + cold plunge.'},
      {day:'Tue',type:'double',name:'Double Day',detail:'AM: 10km steady @ 5:15/km. PM: 6km very easy.',distance:'16km'},
      {day:'Wed',type:'gym',name:'Lower Body + Easy Run',detail:'Lower body session. PM: 6km easy.',distance:'6km'},
      {day:'Thu',type:'double',name:'Double Day',detail:'AM: 10km easy. PM: 6km easy with 8×150m strides.',distance:'16km'},
      {day:'Fri',type:'gym',name:'Upper Body + Easy Run',detail:'Upper body session. PM: 5km easy.',distance:'5km'},
      {day:'Sat',type:'loop',name:'Loop Session (3 laps)',detail:'3×6.7km on the hour. 45–50 min per loop. Practise eating + sitting in rest window.',distance:'20km'},
      {day:'Sun',type:'back2back',name:'Long Easy',detail:'18km @ 5:30–5:50/km on tired legs. Focus: comfort while fatigued.',distance:'18km'}
    ]},
    { week:4, phase:'Build', dates:'27 Jul–2 Aug', volume:90, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Sauna + cold plunge.'},
      {day:'Tue',type:'double',name:'Double Day',detail:'AM: 12km steady @ 5:10–5:20/km. PM: 6km easy.',distance:'18km'},
      {day:'Wed',type:'gym',name:'Lower Body + Easy Run',detail:'Lower body session. PM: 6km easy.',distance:'6km'},
      {day:'Thu',type:'steady',name:'Evening Steady',detail:'14km @ 5:10–5:25/km. Start 8:30 PM — run into darkness. Headlamp last 30 min.',distance:'14km'},
      {day:'Fri',type:'gym',name:'Upper Body + Easy Run',detail:'Upper body session. PM: 5km very easy.',distance:'5km'},
      {day:'Sat',type:'loop',name:'Loop Session (6 laps)',detail:'6×6.7km on the hour. 45–50 min per loop. Full fueling practice — eat 200–250 cal each loop.',distance:'40km'},
      {day:'Sun',type:'back2back',name:'Back-to-Back Long',detail:'16km easy @ 5:40–6:00/km. Run on heavy legs.',distance:'16km'}
    ]},
    { week:5, phase:'Sim Week', dates:'3–9 Aug', volume:78, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Sauna + cold plunge.'},
      {day:'Tue',type:'easy',name:'Easy Run',detail:'10km @ 5:30–5:50/km. Keep it gentle — big weekend ahead.',distance:'10km'},
      {day:'Wed',type:'gym',name:'Lower Body + Easy Run',detail:'Lower body (moderate). PM: 6km easy.',distance:'6km'},
      {day:'Thu',type:'easy',name:'Easy + Strides',detail:'8km easy with 8×100m strides. Stay fresh for Saturday.',distance:'8km'},
      {day:'Fri',type:'rest',name:'Rest / Prep',detail:'Full rest. Prep kit, food, headlamp, route. Sleep in afternoon.'},
      {day:'Sat',type:'sim',name:'🌙 SIM 1: Overnight',detail:'8×6.7km loops, 10PM–6AM. On the hour every hour. Full race nutrition. Headlamp. No music. (~54km)',distance:'54km'},
      {day:'Sun',type:'rest',name:'Recovery',detail:'Sleep. Eat. Walk only. Sauna + cold plunge.'}
    ]},
    { week:6, phase:'Sim Week', dates:'10–16 Aug', volume:95, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Sauna + cold plunge. Recovering from overnight sim.'},
      {day:'Tue',type:'easy',name:'Easy Run',detail:'8km very easy. Assess how legs feel post-sim.',distance:'8km'},
      {day:'Wed',type:'gym',name:'Lower Body + Easy Run',detail:'Lower body (light). PM: 8km easy.',distance:'8km'},
      {day:'Thu',type:'steady',name:'Steady Run',detail:'12km @ 5:15–5:30/km. Controlled. Green light for Saturday.',distance:'12km'},
      {day:'Fri',type:'rest',name:'Rest / Prep',detail:'Full rest. Prep all race-day food, kit, aid station.'},
      {day:'Sat',type:'sim',name:'☀️ SIM 2: Daytime Volume',detail:'12×6.7km loops, 7AM–7PM. Full race execution. All food tested. Last laps into dusk. (~80km)',distance:'80km'},
      {day:'Sun',type:'rest',name:'Recovery',detail:'Full rest. Light walk. Eat well. You\'ve done the work.'}
    ]},
    { week:7, phase:'Taper', dates:'17–23 Aug', volume:47, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Full rest. Sauna + cold plunge.'},
      {day:'Tue',type:'easy',name:'Easy Run',detail:'10km easy @ 5:30–5:50/km. Shake out sim fatigue.',distance:'10km'},
      {day:'Wed',type:'gym',name:'Lower Body (light) + Easy',detail:'Lower body (maintenance). PM: 6km easy.',distance:'6km'},
      {day:'Thu',type:'easy',name:'Easy + Strides',detail:'8km easy with 6×100m strides.',distance:'8km'},
      {day:'Fri',type:'gym',name:'Upper Body (light)',detail:'Upper body (maintenance). No PM run.'},
      {day:'Sat',type:'loop',name:'Loop Rehearsal (3 laps)',detail:'3×6.7km on the hour. Race effort, race food, race kit. Nail the routine.',distance:'20km'},
      {day:'Sun',type:'rest',name:'Rest / Walk',detail:'Light 30-min walk. Full rest otherwise.'}
    ]},
    { week:8, phase:'Race Week', dates:'24–29 Aug', volume:27, days:[
      {day:'Mon',type:'rest',name:'Rest',detail:'Full rest. Legs up. Sauna.'},
      {day:'Tue',type:'easy',name:'Easy + Strides',detail:'8km easy with 6×100m strides.',distance:'8km'},
      {day:'Wed',type:'easy',name:'Easy Run',detail:'6km easy. Stay loose.',distance:'6km'},
      {day:'Thu',type:'loop',name:'Loop Rehearsal',detail:'2×6.7km at race effort (45–50 min). Exact pre-race routine.',distance:'13km'},
      {day:'Fri',type:'rest',name:'Rest / Travel',detail:'Full rest. Pack kit. Travel to Frylands Wood. Early night.'},
      {day:'Sat',type:'easy',name:'Shakeout',detail:'3km very easy + 4×100m strides. Set up camp. Prep aid station.',distance:'3km'},
      {day:'Sun',type:'race',name:'🏁 RACE DAY',detail:'London Backyard Ultra — 24+ Hours starts here.'}
    ]}
  ]
};

function getState() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(plan.startDate + 'T00:00:00');
  const race = new Date(plan.raceDate + 'T00:00:00');
  const diffToRace = Math.ceil((race - today) / 86400000);
  const diffFromStart = Math.floor((today - start) / 86400000);
  let currentWeek = -1;
  let dayIndex = -1;
  if (diffFromStart >= 0 && diffFromStart < 56) {
    currentWeek = Math.floor(diffFromStart / 7) + 1;
    dayIndex = diffFromStart % 7;
  } else if (diffFromStart >= 56) {
    currentWeek = 9;
  }
  return { today, diffToRace, currentWeek, dayIndex };
}

let selectedWeek = null;
let expandedCard = null;
let activeInfoTab = 'strategy';

function isDone(week, dayIdx) {
  return localStorage.getItem('backyard_done_' + week + '_' + dayIdx) === '1';
}
function toggleDone(week, dayIdx) {
  const key = 'backyard_done_' + week + '_' + dayIdx;
  localStorage.getItem(key) === '1' ? localStorage.removeItem(key) : localStorage.setItem(key, '1');
  render();
}

function render() {
  const state = getState();
  if (selectedWeek === null) {
    selectedWeek = state.currentWeek >= 1 && state.currentWeek <= 8 ? state.currentWeek : 1;
  }
  const weekData = plan.weeks[selectedWeek - 1];
  const app = document.getElementById('app');

  let countdownText = '';
  if (state.diffToRace > 0) countdownText = state.diffToRace + ' days to go';
  else if (state.diffToRace === 0) countdownText = 'Race day!';
  else countdownText = 'Race complete';

  let weekText = '';
  if (state.currentWeek >= 1 && state.currentWeek <= 8) {
    weekText = 'Week ' + state.currentWeek + ' · ' + plan.weeks[state.currentWeek - 1].phase;
  } else if (state.currentWeek === 9) {
    weekText = 'Training complete';
  } else {
    weekText = 'Starts Jul 6';
  }

  // Hero
  let heroHTML = '';
  if (state.currentWeek >= 1 && state.currentWeek <= 8) {
    const s = plan.weeks[state.currentWeek - 1].days[state.dayIndex];
    const dateStr = state.today.toLocaleDateString('en-GB', { weekday: 'long', month: 'short', day: 'numeric' });
    heroHTML = '<div class="hero-card ' + s.type + '"><div class="hero-date">' + dateStr + '</div>' +
      '<div class="hero-name">' + s.name + '</div><div class="hero-detail">' + s.detail + '</div>' +
      '<div class="hero-badges">' +
      (s.distance ? '<span class="badge badge-distance">' + s.distance + '</span>' : '') +
      (s.type === 'sim' ? '<span class="badge badge-sim">Simulation</span>' : '') +
      '</div></div>';
  } else if (state.currentWeek === 9) {
    heroHTML = '<div class="hero-prestart">Race complete. Legend. 🔥</div>';
  } else {
    heroHTML = '<div class="hero-prestart">Training starts Jul 6, 2026</div>';
  }

  // Week tabs
  let tabsHTML = '';
  for (let i = 1; i <= 8; i++) {
    const active = i === selectedWeek ? ' active' : '';
    tabsHTML += '<div class="week-tab' + active + '" data-week="' + i + '">W' + i + '</div>';
  }

  // Sessions
  let sessionsHTML = '';
  weekData.days.forEach(function(s, idx) {
    const done = isDone(selectedWeek, idx);
    const expanded = expandedCard === selectedWeek + '_' + idx;
    const isToday = (selectedWeek === state.currentWeek && idx === state.dayIndex);
    let cls = 'session-card ' + s.type;
    if (done) cls += ' done';
    if (expanded) cls += ' expanded';
    if (isToday) cls += ' today';
    sessionsHTML += '<div class="' + cls + '" data-week="' + selectedWeek + '" data-idx="' + idx + '">' +
      '<div class="session-header"><span class="session-day">' + s.day + '</span>' +
      '<span class="session-name">' + s.name + '</span>' +
      (s.distance ? '<span class="session-dist">' + s.distance + '</span>' : '') +
      '</div><div class="session-expand"><div class="session-detail">' + s.detail +
      '<br><span class="done-btn" data-week="' + selectedWeek + '" data-idx="' + idx + '">' +
      (done ? 'Undo' : '✓ Done') + '</span></div></div></div>';
  });

  // Volume chart
  const volumes = plan.weeks.map(w => w.volume);
  const maxVol = Math.max(...volumes);
  let chartHTML = '';
  volumes.forEach(function(v, i) {
    const pct = (v / maxVol * 100).toFixed(1);
    const active = (i + 1) === selectedWeek ? ' active' : '';
    chartHTML += '<div class="volume-bar-row"><span class="volume-label">W' + (i+1) + '</span>' +
      '<div class="volume-bar-bg"><div class="volume-bar' + active + '" style="width:' + pct + '%"></div></div>' +
      '<span class="volume-val">' + v + '</span></div>';
  });

  // Info section
  const infoTabs = ['strategy','fueling','night','kit','mental'];
  let infoTabsHTML = '';
  infoTabs.forEach(t => {
    const label = {strategy:'Race Strategy',fueling:'Fueling',night:'Night Plan',kit:'Kit List',mental:'Mental'}[t];
    infoTabsHTML += '<div class="info-tab' + (activeInfoTab===t?' active':'') + '" data-info="' + t + '">' + label + '</div>';
  });

  const infoPanels = {
    strategy: '<h3>Pacing</h3><ul>' +
      '<li>Target: 45–50 min per loop (6:43–7:27/km)</li>' +
      '<li>Do NOT run faster than 45 min in the first 12 laps</li>' +
      '<li>Let pace drift to 50 min in hours 18–24</li>' +
      '<li>Walk uphills from lap 1 — save legs for flat/downhill</li>' +
      '<li>Same pace, same effort, every single loop</li></ul>' +
      '<h3>Transitions (10–15 min)</h3><ul>' +
      '<li>Arrive → Sit (30s) → Eat → Drink → Assess feet/kit</li>' +
      '<li>Change socks every 6–8 hours</li>' +
      '<li>Layer changes at nightfall and dawn</li>' +
      '<li>Set timer for 3 min before each hour</li></ul>',
    fueling: '<h3>Hourly Targets</h3><p>~250 cal + 500–750ml fluid + 500–700mg sodium per hour.</p>' +
      '<div class="fuel-row"><span class="phase">Hrs 1–6</span><span class="cals">200–250 cal</span><span class="foods">Gels, banana, rice cakes, bars</span></div>' +
      '<div class="fuel-row"><span class="phase">Hrs 7–14</span><span class="cals">250–300 cal</span><span class="foods">Sandwiches, wraps, rice, flapjack, crisps</span></div>' +
      '<div class="fuel-row"><span class="phase">Hrs 15–20</span><span class="cals">250–300 cal</span><span class="foods">Soup, noodles, mash, hot choc, gels</span></div>' +
      '<div class="fuel-row"><span class="phase">Hrs 21–24+</span><span class="cals">200–250 cal</span><span class="foods">Whatever works: gels, cola, toast, porridge</span></div>' +
      '<p>Test everything in training sims. Never try new food on race day.</p>',
    night: '<h3>Night Strategy (Laps 14–20)</h3><ul>' +
      '<li>Headlamp: fully charged + spare</li>' +
      '<li>Extra layer: long sleeve + gilet minimum</li>' +
      '<li>Warm food: soup, noodles, hot chocolate</li>' +
      '<li>Caffeine from 2AM onwards (max 200mg every 3hrs)</li>' +
      '<li>2–5 AM will be the hardest. It passes.</li>' +
      '<li>Red-light headlamp mode preserves night vision</li></ul>',
    kit: '<h3>Running Kit</h3><ul>' +
      '<li>Trail shoes (broken in)</li><li>3× pairs running socks</li>' +
      '<li>Shorts + t-shirt (day)</li><li>Long sleeve + tights (night)</li>' +
      '<li>Gilet / windproof</li><li>Cap (day) + beanie (night)</li><li>Gloves</li></ul>' +
      '<h3>Equipment</h3><ul>' +
      '<li>Headlamp + spare</li><li>Watch with lap timer</li>' +
      '<li>Chair + small table</li><li>Blanket for sitting</li>' +
      '<li>Vaseline / anti-chafe</li></ul>' +
      '<h3>Nutrition Station</h3><ul>' +
      '<li>Cooler with pre-portioned food bags (1 per lap)</li>' +
      '<li>2× thermos (hot water for soup/noodles)</li>' +
      '<li>Caffeine gels/pills</li><li>Electrolyte mix + bottles</li>' +
      '<li>Flat cola (late hours)</li></ul>',
    mental: '<h3>Mental Framework</h3><ul>' +
      '<li>Only ever think about THIS loop</li>' +
      '<li>Break into blocks: "Get to 12" → "Get to sunrise" → "Keep going"</li>' +
      '<li>Low moments always pass — never quit during a low</li>' +
      '<li>If doubting, commit to just starting the next loop</li>' +
      '<li>Stay emotionally neutral — highs and lows both drain energy</li>' +
      '<li>Boredom is the real enemy — embrace monotony in training</li></ul>'
  };

  let infoPanelsHTML = '';
  infoTabs.forEach(t => {
    infoPanelsHTML += '<div class="panel' + (activeInfoTab===t?' active':'') + '">' + infoPanels[t] + '</div>';
  });

  app.innerHTML =
    '<header><h1>London Backyard Ultra 2026</h1><div class="meta"><span>' + countdownText + '</span><span>' + weekText + '</span></div></header>' +
    '<section class="hero">' + heroHTML + '</section>' +
    '<nav class="week-tabs"><div class="week-tabs-inner">' + tabsHTML + '</div></nav>' +
    '<section class="week-sessions">' + sessionsHTML + '</section>' +
    '<section class="volume-chart"><div class="volume-title">Weekly Volume (km)</div>' + chartHTML + '</section>' +
    '<section class="info-tabs"><div class="info-tabs-inner">' + infoTabsHTML + '</div></section>' +
    '<section class="info-panel">' + infoPanelsHTML + '</section>';

  // Events
  document.querySelectorAll('.week-tab').forEach(tab => {
    tab.addEventListener('click', function() { selectedWeek = parseInt(this.dataset.week); expandedCard = null; render(); });
  });
  document.querySelectorAll('.session-header').forEach(hdr => {
    hdr.addEventListener('click', function() {
      const card = this.parentElement;
      const key = card.dataset.week + '_' + card.dataset.idx;
      expandedCard = expandedCard === key ? null : key;
      render();
    });
  });
  document.querySelectorAll('.done-btn').forEach(btn => {
    btn.addEventListener('click', function(e) { e.stopPropagation(); toggleDone(parseInt(this.dataset.week), parseInt(this.dataset.idx)); });
  });
  document.querySelectorAll('.info-tab').forEach(tab => {
    tab.addEventListener('click', function() { activeInfoTab = this.dataset.info; render(); });
  });
  const activeTab = document.querySelector('.week-tab.active');
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

render();
</script>
</body>
</html>
